# Longer-horizon composite tasks for OpenApps.
#
# Each entry is a CompositeTask: several ordinary sub-tasks (add/remove
# calendar events, add/mark/delete todos, send messages, remove saved
# landmarks) that must ALL be satisfied. Completion reuses each sub-task's
# get_target_state threaded together, then the shared AppStateComparison.
#
# Standalone file: run with `tasks=longer_horizon` (Hydra) or load directly.
# `_convert_: all` makes Hydra recursively instantiate the nested sub-tasks.
# Messenger auto-replies are ignored when checking (the reply is random for
# anyone but Alice/Bob), bounded by the number of messages the task sends.
#
# Every value the agent must produce (event/todo titles, message text) is
# quoted verbatim in the goal; items the agent selects (events/todos to
# remove, landmarks) reference existing seed data by name.
#
# Difficulty rises with the number of apps/sub-goals and field richness.


# ==========================================================================
# EASY (2 apps / 2 sub-goals)
# ==========================================================================

