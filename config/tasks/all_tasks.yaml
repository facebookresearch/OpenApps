# ---- Cross-app navigation tasks (click-only) -----------------------------
# Each variant starts the agent in ``source_app`` and is rewarded once the
# page URL points at ``target_app``. The natural 2-click solution is:
#   click "Return to List of Apps" -> click the target app icon on /.

navigate_from_todo_to_calendar:
