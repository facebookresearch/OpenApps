# @package _global_
# Launch EVERY task -- the originals plus all goal-style variations -- in
# parallel, one job per goal phrasing. This is how you run across goal
# variations:
#
#   uv run launch_parallel_agents.py \
#     --config-name=config_parallel_tasks_across_goal_variations mode=slurm_cluster
#
# (use mode=local to run the jobs sequentially in this process instead.)
#
# The goal-style variations themselves live in
# config/tasks/user_goal_variations.yaml, keyed <original>__<style>_<n>
# where <style> is one of casual | formal | unrelated_context. Each entry
# preserves the original task's reward; only the goal wording differs.
#
# task_names below lists every key in the merged task set (originals +
# variations); keep it in sync with config/tasks/*.yaml when tasks change.
defaults:
  - mode: local
  - agent: dummy
  - tasks: all_tasks
  - browsergym_env_args: default
  - apps/code_editor: default
  - apps/maps: default
  - apps/messenger: default
  - apps/start_page: default
  - apps/calendar: default
  - apps/todo: default
  - apps/onlineshop: default
  - apps/pop_ups: default
  - _self_

# Sweep: every task_name x every app_variation. Here we keep a single
# default app variation so the sweep axis is purely the goal phrasing.
